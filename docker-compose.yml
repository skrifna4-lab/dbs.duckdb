version: "3.9"

services:
  orchestrator:
    build: .
    container_name: orchestrator-core
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - PORT=8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
